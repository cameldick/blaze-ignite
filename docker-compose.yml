# Local Postgres for development/testing.
#   docker compose up -d
# Then set DATABASE_URL="postgresql://blaze:blaze@localhost:5433/blaze_ignite?schema=public"
services:
  postgres:
    image: postgres:15
    container_name: blaze-ignite-pg
    environment:
      POSTGRES_USER: blaze
      POSTGRES_PASSWORD: blaze
      POSTGRES_DB: blaze_ignite
    ports:
      - "5433:5432"
    volumes:
      - blaze_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blaze"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  blaze_pg:
